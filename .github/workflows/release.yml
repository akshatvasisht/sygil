name: Release

on:
  push:
    branches: [main]

concurrency: ${{ github.workflow }}-${{ github.ref }}

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      # `id-token: write` enables both:
      #   - npm provenance attestations (`npm publish --provenance`)
      #   - keyless Sigstore signing of the bundled templates (issue #43)
      # Both mechanisms share one OIDC trust chain.
      contents: write
      id-token: write
      pull-requests: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          registry-url: 'https://registry.npmjs.org'

      - run: npm ci

      - run: npm run build

      # Sign bundled templates (issue #43) so the sidecars ride inside the
      # tarball that `npm publish` uploads. Runtime verification
      # (SYGIL_VERIFY_TEMPLATES=1) checks these against this workflow's OIDC
      # identity. Skip when there is nothing to publish — changesets/action
      # will no-op anyway, but signing is cheap and idempotent.
      - name: Install cosign
        uses: sigstore/cosign-installer@v3

      - name: Sign bundled templates (keyless Sigstore)
        run: |
          set -euo pipefail
          shopt -s nullglob
          for tpl in packages/cli/templates/*.json; do
            cosign sign-blob \
              --yes \
              --bundle "${tpl}.sigstore.json" \
              "$tpl"
          done

      - uses: changesets/action@v1
        with:
          publish: npm run release
          title: "chore: release packages"
          commit: "chore: release packages"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
          # npm provenance needs `id-token: write` (granted above) AND this
          # env flag. The CLI's publishConfig sets --provenance explicitly,
          # but we also export it here so workspace packages honoured by the
          # changesets publish script pick it up without per-package opt-in.
          NPM_CONFIG_PROVENANCE: "true"

  docker:
    name: Build and push Docker image
    runs-on: ubuntu-latest
    needs: release
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/metadata-action@v5
        id: meta
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=ref,event=tag
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=raw,value=latest
      - uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
